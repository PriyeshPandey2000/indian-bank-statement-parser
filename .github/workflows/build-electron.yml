name: Build Electron App

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Write backend .env
        run: echo "${{ secrets.BACKEND_ENV }}" > backend/.env

      - name: Package Mac
        working-directory: desktop
        run: npm run package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenParsed-mac
          path: desktop/release/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Write backend .env
        run: echo "${{ secrets.BACKEND_ENV }}" > backend/.env

      - name: Package Windows
        working-directory: desktop
        run: npm run package

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenParsed-windows
          path: desktop/release/*.exe
